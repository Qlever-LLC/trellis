name: Release CLI

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Create or update the GitHub release"
        required: false
        default: false
        type: boolean
      tag:
        description: "Tag to publish when running manually (for example v0.8.0-rc.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release-cli.yml"
      - "CHANGELOG.md"
      - "js/tools/release/**"
      - "rust/**"

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag || '' }}

jobs:
  verify:
    name: Verify trellis CLI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap generated SDK artifacts
        run: cargo run --manifest-path rust/tools/generate/Cargo.toml -- prepare --no-npm .

      - name: Prepare release version
        run: cargo run --manifest-path xtask/Cargo.toml -- release prepare --tag "${RELEASE_TAG}"

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            cargo run --manifest-path xtask/Cargo.toml -- release verify --version "${RELEASE_TAG#v}"
          else
            cargo run --manifest-path xtask/Cargo.toml -- release verify
          fi

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/tools/generate -> target

      - name: Generate SDK artifacts
        run: cargo run --manifest-path rust/tools/generate/Cargo.toml -- prepare --no-npm .

      - name: Run CLI tool tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            cargo test -p trellis-cli
            cargo test --manifest-path tools/generate/Cargo.toml
          else
            cargo test -p trellis-cli --locked
            cargo test --manifest-path tools/generate/Cargo.toml --locked
          fi
        working-directory: rust

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add target toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Bootstrap generated SDK artifacts
        run: cargo run --manifest-path rust/tools/generate/Cargo.toml -- prepare --no-npm .

      - name: Prepare release version
        run: cargo run --manifest-path xtask/Cargo.toml -- release prepare --tag "${RELEASE_TAG}"

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            cargo run --manifest-path xtask/Cargo.toml -- release verify --version "${RELEASE_TAG#v}"
          else
            cargo run --manifest-path xtask/Cargo.toml -- release verify
          fi

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/tools/generate -> target

      - name: Generate SDK artifacts
        run: cargo run --manifest-path rust/tools/generate/Cargo.toml -- prepare --no-npm .

      - name: Build release binaries
        shell: bash
        env:
          TRELLIS_OFFICIAL_BUILD: "1"
          TRELLIS_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            cargo build -p trellis-cli --release --target ${{ matrix.target }}
            cargo build --manifest-path tools/generate/Cargo.toml --release --target ${{ matrix.target }}
          else
            cargo build -p trellis-cli --release --locked --target ${{ matrix.target }}
            cargo build --manifest-path tools/generate/Cargo.toml --release --locked --target ${{ matrix.target }}
          fi
        working-directory: rust

      - name: Package CLI archives
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.tag || github.ref_name || 'dev' }}"
          target="${{ matrix.target }}"
          archive_version="${version//\//-}"
          staging="dist/${target}"
          mkdir -p "$staging"

          cp "rust/target/${target}/release/trellis" "$staging/trellis"
          archive="trellis-${archive_version}-${target}.tar.gz"
          tar -C "$staging" -czf "dist/$archive" trellis
          shasum -a 256 "dist/$archive" > "dist/checksum-${archive_version}-${target}-trellis.sha256"

          cp "rust/tools/generate/target/${target}/release/trellis-generate" "$staging/trellis-generate"
          archive="trellis-generate-${archive_version}-${target}.tar.gz"
          tar -C "$staging" -czf "dist/$archive" trellis-generate
          shasum -a 256 "dist/$archive" > "dist/checksum-${archive_version}-${target}-trellis-generate.sha256"

      - name: Upload packaged CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: trellis-cli-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: Publish GitHub release
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish && inputs.tag != '') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap generated SDK artifacts
        run: cargo run --manifest-path rust/tools/generate/Cargo.toml -- prepare --no-npm .

      - name: Validate release metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          cargo run --manifest-path xtask/Cargo.toml -- release verify --version "${RELEASE_TAG#v}"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: trellis-cli-*
          merge-multiple: true

      - name: Write release notes
        run: cargo run --manifest-path xtask/Cargo.toml -- release write-notes --tag "${RELEASE_TAG}" --output "${{ github.workspace }}/dist/release-notes.md"
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TRELLIS_RELEASE_TOKEN || github.token }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          body_path: dist/release-notes.md
          prerelease: ${{ contains(startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag, '-') }}
