name: Release CLI

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Create or update the GitHub release"
        required: false
        default: false
        type: boolean
      tag:
        description: "Tag to publish when running manually (for example v0.6.0-rc.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release-cli.yml"
      - "rust/**"

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag || '' }}

jobs:
  verify:
    name: Verify trellis CLI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Prepare release version
        run: deno run --config js/deno.json -A js/tools/release/prepare_release.ts
        env:
          TRELLIS_RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Seed generated SDK manifests for cargo metadata
        shell: bash
        working-directory: rust
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"

          write_stub_manifest() {
            local dir="$1"
            local crate_name="$2"

            mkdir -p "$dir"
            printf '[package]\nname = "%s"\nversion = "%s"\nedition = "2021"\nlicense = "Apache-2.0"\n\n[dependencies]\n' "$crate_name" "$workspace_version" > "$dir/Cargo.toml"
          }

          write_stub_manifest ../generated/rust/sdks/auth trellis-sdk-auth
          write_stub_manifest ../generated/rust/sdks/trellis-core trellis-sdk-core
          write_stub_manifest ../generated/rust/sdks/jobs trellis-sdk-jobs

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/tools/generate -> target

      - name: Generate SDK artifacts
        run: cargo xtask prepare

      - name: Run trellis CLI tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            cargo test -p trellis-cli
          else
            cargo test -p trellis-cli --locked
          fi
        working-directory: rust

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Prepare release version
        run: deno run --config js/deno.json -A js/tools/release/prepare_release.ts
        env:
          TRELLIS_RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Seed generated SDK manifests for cargo metadata
        shell: bash
        working-directory: rust
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"

          write_stub_manifest() {
            local dir="$1"
            local crate_name="$2"

            mkdir -p "$dir"
            printf '[package]\nname = "%s"\nversion = "%s"\nedition = "2021"\nlicense = "Apache-2.0"\n\n[dependencies]\n' "$crate_name" "$workspace_version" > "$dir/Cargo.toml"
          }

          write_stub_manifest ../generated/rust/sdks/auth trellis-sdk-auth
          write_stub_manifest ../generated/rust/sdks/trellis-core trellis-sdk-core
          write_stub_manifest ../generated/rust/sdks/jobs trellis-sdk-jobs

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/tools/generate -> target

      - name: Generate SDK artifacts
        run: cargo xtask prepare

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            cargo build -p trellis-cli --release --target ${{ matrix.target }}
          else
            cargo build -p trellis-cli --release --locked --target ${{ matrix.target }}
          fi
        working-directory: rust

      - name: Package CLI archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.tag || github.ref_name || 'dev' }}"
          target="${{ matrix.target }}"
          archive_version="${version//\//-}"
          archive="trellis-${archive_version}-${target}.tar.gz"
          staging="dist/${target}"
          mkdir -p "$staging"
          cp "rust/target/${target}/release/trellis" "$staging/trellis"
          tar -C "$staging" -czf "dist/$archive" trellis
          shasum -a 256 "dist/$archive" > "dist/$archive.sha256"

      - name: Upload packaged CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: trellis-cli-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: Publish GitHub release
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish && inputs.tag != '') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: trellis-cli-*
          merge-multiple: true

      - name: Write release notes
        run: deno run --config js/deno.json -A js/tools/release/write_release_notes.ts
        env:
          TRELLIS_RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          TRELLIS_RELEASE_NOTES_OUTPUT: ${{ github.workspace }}/dist/release-notes.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          body_path: dist/release-notes.md
          prerelease: ${{ contains(startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag, '-') }}
