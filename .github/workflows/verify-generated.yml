name: Verify Generated Artifacts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/verify-generated.yml"
      - ".gitignore"
      - "generated/**"
      - "js/deno.json"
      - "js/services/activity/deno.json"
      - "js/packages/contracts/**"
      - "js/packages/trellis/**"
      - "js/services/trellis/contracts/**"
      - "js/services/activity/contracts/**"
      - "rust/crates/trellis-cli/**"
      - "rust/crates/trellis-codegen-ts/**"
      - "rust/crates/trellis-codegen-rust/**"
      - "rust/crates/trellis-contracts/**"
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate tracked artifacts
        run: |
          deno task -c js/deno.json build:contracts
          deno task -c js/deno.json sdk:platform:rust
          deno task -c js/services/activity/deno.json build:sdk

      - name: Verify generated artifacts are up to date
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --short --untracked-files=all -- generated)" ]]; then
            git status --short --untracked-files=all -- generated
            echo "Generated artifacts are out of date. Regenerate and commit the changes." >&2
            exit 1
          fi
