name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates to crates.io"
        required: false
        default: false
        type: boolean
      tag:
        description: "Tag to publish when running manually (for example v0.8.0-rc.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/publish-crates.yml"
      - "js/services/trellis/contracts/**"
      - "rust/**"

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag || '' }}
  SHOULD_PUBLISH: ${{ startsWith(github.ref, 'refs/tags/') || (inputs.publish == true && inputs.tag != '') }}

jobs:
  publish:
    name: Verify and publish Rust crates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Prepare release version
        run: deno run --config js/deno.json -A js/tools/release/prepare_release.ts
        env:
          TRELLIS_RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Seed generated SDK manifests for cargo metadata
        shell: bash
        working-directory: rust
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"

          write_stub_manifest() {
            local dir="$1"
            local crate_name="$2"

            mkdir -p "$dir"
            printf '[package]\nname = "%s"\nversion = "%s"\nedition = "2021"\nlicense = "Apache-2.0"\n\n[dependencies]\n' "$crate_name" "$workspace_version" > "$dir/Cargo.toml"
          }

          write_stub_manifest ../generated/rust/sdks/auth trellis-sdk-auth
          write_stub_manifest ../generated/rust/sdks/trellis-core trellis-sdk-core
          write_stub_manifest ../generated/rust/sdks/jobs trellis-sdk-jobs

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/tools/generate -> target

      - name: Generate SDK artifacts
        run: cargo xtask prepare

      - name: Run workspace tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            cargo test --workspace
          else
            cargo test --workspace --locked
          fi
        working-directory: rust

      - name: Authenticate with crates.io
        if: env.SHOULD_PUBLISH == 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        if: env.SHOULD_PUBLISH == 'true'
        shell: bash
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"
          published=()
          skipped=()

          crate_exists() {
            local crate="$1"
            local version="$2"
            curl --silent --show-error --fail "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null 2>&1
          }

          record_skip() {
            local crate="$1"
            echo "Skipping ${crate}@${workspace_version} (already published)"
            skipped+=("${crate}@${workspace_version}")
          }

          record_publish() {
            local crate="$1"
            published+=("${crate}@${workspace_version}")
          }

          run_publish() {
            local crate="$1"
            shift
            local output
            local status

            set +e
            output=$(cargo publish --allow-dirty "$@" 2>&1)
            status=$?
            set -e

            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              record_publish "$crate"
              return 0
            fi

            if printf '%s\n' "$output" | grep -Fq "already exists on crates.io index"; then
              record_skip "$crate"
              return 0
            fi

            return "$status"
          }

          publish_workspace_crate() {
            local crate="$1"

            if crate_exists "$crate" "$workspace_version"; then
              record_skip "$crate"
              return 0
            fi

            run_publish "$crate" -p "$crate"
          }

          publish_generated_crate() {
            local manifest="$1"
            local crate="$2"

            if crate_exists "$crate" "$workspace_version"; then
              record_skip "$crate"
              return 0
            fi

            run_publish "$crate" --manifest-path "$manifest"
          }

          generate_publishable_sdk_crates() {
            cargo run --manifest-path tools/generate/Cargo.toml --bin trellis-generate -- generate rust --source ../js/services/trellis/contracts/trellis_auth.ts --out ../generated/rust/sdks/auth --crate-name trellis-sdk-auth --runtime-source registry
            cargo run --manifest-path tools/generate/Cargo.toml --bin trellis-generate -- generate rust --source ../js/services/trellis/contracts/trellis_core.ts --out ../generated/rust/sdks/trellis-core --crate-name trellis-sdk-core --runtime-source registry
          }

          # Publish crates that the generated Rust SDKs depend on before
          # rewriting those SDK manifests to use registry dependencies.
          publish_workspace_crate trellis-client
          publish_workspace_crate trellis-contracts
          publish_workspace_crate trellis-server

          publish_workspace_crate trellis-codegen-rust
          publish_workspace_crate trellis-codegen-ts

          # Switch the generated SDK crates to crates.io runtime dependencies only
          # after the shared runtime crates are actually available there.
          generate_publishable_sdk_crates

          publish_generated_crate ../generated/rust/sdks/auth/Cargo.toml trellis-sdk-auth
          publish_generated_crate ../generated/rust/sdks/trellis-core/Cargo.toml trellis-sdk-core

          publish_workspace_crate trellis-auth
          publish_workspace_crate trellis-cli

          echo "Published ${#published[@]} crate(s)"
          for item in "${published[@]}"; do
            echo "  published: $item"
          done

          echo "Skipped ${#skipped[@]} crate(s)"
          for item in "${skipped[@]}"; do
            echo "  skipped: $item"
          done
