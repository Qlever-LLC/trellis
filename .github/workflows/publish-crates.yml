name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates to crates.io"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/publish-crates.yml"
      - "js/services/trellis/catalog/contracts/**"
      - "rust/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify Rust crates
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/bootstrap -> target

      - name: Generate SDK artifacts
        run: deno task build:sdk
        working-directory: js
        env:
          TRELLIS_USE_BOOTSTRAP: "1"

      - name: Run workspace tests
        run: cargo test --workspace --locked
        working-directory: rust

  publish:
    name: Publish to crates.io
    if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish == true }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/bootstrap -> target

      - name: Generate SDK artifacts
        run: deno task build:sdk
        working-directory: js
        env:
          TRELLIS_USE_BOOTSTRAP: "1"

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        shell: bash
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"

          wait_for_registry_version() {
            local crate="$1"
            local version="$2"
            local attempts=0

            until cargo info --registry crates-io "${crate}@${version}" >/dev/null 2>&1; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge 30 ]; then
                echo "Timed out waiting for ${crate} ${version} in crates.io index"
                return 1
              fi

              echo "Waiting for ${crate} ${version} to appear in crates.io index..."
              sleep 10
            done
          }

          wait_for_registry_settle() {
            echo "Waiting for crates.io index propagation..."
            sleep 45
          }

          publish_workspace_crate() {
            local crate="$1"
            cargo publish -p "$crate"
            wait_for_registry_version "$crate" "$workspace_version"
          }

          publish_generated_crate() {
            local manifest="$1"
            local crate="$2"
            cargo publish --manifest-path "$manifest"
            wait_for_registry_version "$crate" "$workspace_version"
          }

          generate_publishable_sdk_crates() {
            cargo run --manifest-path bootstrap/Cargo.toml -- generate rust --source ../js/services/trellis/catalog/contracts/trellis_auth.ts --out ../generated/rust/sdks/auth --crate-name trellis-sdk-auth --runtime-source registry
            cargo run --manifest-path bootstrap/Cargo.toml -- generate rust --source ../js/services/trellis/catalog/contracts/trellis_core.ts --out ../generated/rust/sdks/trellis-core --crate-name trellis-sdk-core --runtime-source registry
          }

          # Publish crates that the generated Rust SDKs depend on before
          # rewriting those SDK manifests to use registry dependencies.
          publish_workspace_crate trellis-client
          publish_workspace_crate trellis-contracts
          publish_workspace_crate trellis-server

          publish_workspace_crate trellis-codegen-rust
          publish_workspace_crate trellis-codegen-ts

          # Switch the generated SDK crates to crates.io runtime dependencies only
          # after the shared runtime crates are actually available there.
          generate_publishable_sdk_crates

          # Give crates.io time to propagate the runtime crates before publishing
          # generated SDK crates that depend on them.
          wait_for_registry_settle

          publish_generated_crate ../generated/rust/sdks/auth/Cargo.toml trellis-sdk-auth
          publish_generated_crate ../generated/rust/sdks/trellis-core/Cargo.toml trellis-sdk-core

          # The first-party crates depend on the generated SDKs, so let the index
          # settle again before publishing them.
          wait_for_registry_settle

          publish_workspace_crate trellis-auth
          publish_workspace_crate trellis-cli
