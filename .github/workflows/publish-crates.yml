name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates to crates.io"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/publish-crates.yml"
      - "js/services/trellis/catalog/contracts/**"
      - "rust/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify Rust crates
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/bootstrap -> target

      - name: Generate SDK artifacts
        run: deno task build:sdk
        working-directory: js
        env:
          TRELLIS_USE_BOOTSTRAP: "1"

      - name: Run workspace tests
        run: cargo test --workspace --locked
        working-directory: rust

  publish:
    name: Publish to crates.io
    if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish == true }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/bootstrap -> target

      - name: Generate SDK artifacts
        run: deno task build:sdk
        working-directory: js
        env:
          TRELLIS_USE_BOOTSTRAP: "1"

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Generate publishable Rust SDK crates
        working-directory: rust
        run: |
          set -euo pipefail

          cargo run --manifest-path bootstrap/Cargo.toml -- generate rust --source ../js/services/trellis/catalog/contracts/trellis_auth.ts --out ../generated/rust/sdks/auth --crate-name trellis-sdk-auth --runtime-source registry
          cargo run --manifest-path bootstrap/Cargo.toml -- generate rust --source ../js/services/trellis/catalog/contracts/trellis_core.ts --out ../generated/rust/sdks/trellis-core --crate-name trellis-sdk-core --runtime-source registry

      - name: Publish crates
        shell: bash
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          packages=(
            trellis-client
            trellis-contracts
            trellis-server
            trellis-codegen-rust
            trellis-codegen-ts
            trellis-auth
            trellis-cli
          )

          for pkg in "${packages[@]}"; do
            cargo publish -p "$pkg"
            echo "Waiting for crates.io index to catch up..."
            sleep 20
          done

          generated_crates=(
            ../generated/rust/sdks/auth/Cargo.toml
            ../generated/rust/sdks/trellis-core/Cargo.toml
          )

          for manifest in "${generated_crates[@]}"; do
            cargo publish --manifest-path "$manifest"
            echo "Waiting for crates.io index to catch up..."
            sleep 20
          done
