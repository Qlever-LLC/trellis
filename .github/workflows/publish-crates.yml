name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates to crates.io"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/publish-crates.yml"
      - "rust/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify Rust crates
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run workspace tests
        run: cargo test --workspace --locked
        working-directory: rust

  publish:
    name: Publish to crates.io
    if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish == true }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        shell: bash
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          packages=(
            trellis-client
            trellis-contracts
            trellis-server
            trellis-sdk-auth
            trellis-sdk-core
            trellis-codegen-rust
            trellis-codegen-ts
            trellis-auth
            trellis-cli-participant
            trellis-cli
          )

          for pkg in "${packages[@]}"; do
            cargo publish -p "$pkg"
            echo "Waiting for crates.io index to catch up..."
            sleep 20
          done
