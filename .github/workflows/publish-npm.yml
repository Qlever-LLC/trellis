name: Publish NPM Packages

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish packages to npm"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/publish-npm.yml"
      - "js/deno.json"
      - "js/services/**/deno.json"
      - "js/tools/package_build/**"
      - "js/packages/auth/**"
      - "js/packages/contracts/**"
      - "js/packages/telemetry/**"
      - "js/packages/result/**"
      - "js/packages/server/**"
      - "js/packages/trellis/**"
      - "js/packages/trellis-svelte/**"
      - "js/services/trellis/contracts/**"
      - "js/services/activity/contracts/**"
      - "rust/**"
      - "scripts/**"

jobs:
  cli:
    name: Build trellis CLI once
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build trellis CLI
        run: cargo build -p trellis-cli --locked
        working-directory: rust

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: trellis-cli
          path: rust/target/debug/trellis

  build:
    name: Build npm packages
    runs-on: ubuntu-latest
    needs: cli
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download trellis CLI
        uses: actions/download-artifact@v4
        with:
          name: trellis-cli
          path: /tmp/trellis-cli

      - name: Use downloaded CLI
        shell: bash
        run: |
          set -euo pipefail
          chmod +x /tmp/trellis-cli/trellis
          echo "TRELLIS_CLI_BIN=/tmp/trellis-cli/trellis" >> "$GITHUB_ENV"

      - name: Build publishable npm packages
        run: deno task build:npm
        working-directory: js

      - name: Validate package archives
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            js/packages/result/npm
            js/packages/trellis/npm
            js/packages/trellis-svelte/npm
          )
          for pkg in "${packages[@]}"; do
            npm pack "$pkg" >/dev/null
          done

      - name: Smoke test package imports
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/trellis-npm-smoke
          mkdir -p /tmp/trellis-npm-smoke
          cd /tmp/trellis-npm-smoke
          npm init -y >/dev/null
          result_tgz=$(npm pack "$GITHUB_WORKSPACE/js/packages/result/npm" --pack-destination . | tail -n 1)
          trellis_tgz=$(npm pack "$GITHUB_WORKSPACE/js/packages/trellis/npm" --pack-destination . | tail -n 1)
          trellis_svelte_tgz=$(npm pack "$GITHUB_WORKSPACE/js/packages/trellis-svelte/npm" --pack-destination . | tail -n 1)
          npm install \
            "./$result_tgz" \
            "./$trellis_tgz" \
            "./$trellis_svelte_tgz" >/dev/null
          node --input-type=module <<'EOF'
          await import("@qlever-llc/result");
          await import("@qlever-llc/trellis");
          await import("@qlever-llc/trellis/auth");
          await import("@qlever-llc/trellis/contracts");
          await import("@qlever-llc/trellis/sdk/auth");
          await import("@qlever-llc/trellis/sdk/core");
          await import("@qlever-llc/trellis/tracing");
          await import("@qlever-llc/trellis/server");
          await import("@qlever-llc/trellis/server/node");
          EOF

  publish:
    name: Publish to npm
    if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish == true }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download trellis CLI
        uses: actions/download-artifact@v4
        with:
          name: trellis-cli
          path: /tmp/trellis-cli

      - name: Use downloaded CLI
        shell: bash
        run: |
          set -euo pipefail
          chmod +x /tmp/trellis-cli/trellis
          echo "TRELLIS_CLI_BIN=/tmp/trellis-cli/trellis" >> "$GITHUB_ENV"

      - name: Build publishable npm packages
        run: deno task build:npm
        working-directory: js

      - name: Publish packages
        shell: bash
        run: |
          set -euo pipefail
          npm_tag=latest
          published=()
          skipped=()
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == *-* ]]; then
            npm_tag=rc
          fi

          packages=(
            js/packages/result/npm
            js/packages/trellis/npm
            js/packages/trellis-svelte/npm
          )
          for pkg in "${packages[@]}"; do
            package_json="$pkg/package.json"
            name=$(node -p "require('./${package_json}').name")
            version=$(node -p "require('./${package_json}').version")

            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version (already published)"
              skipped+=("$name@$version")
              continue
            fi

            npm publish --access public --tag "$npm_tag" "$pkg"
            published+=("$name@$version")
          done

          echo "Published ${#published[@]} package(s)"
          for item in "${published[@]}"; do
            echo "  published: $item"
          done

          echo "Skipped ${#skipped[@]} package(s)"
          for item in "${skipped[@]}"; do
            echo "  skipped: $item"
          done
