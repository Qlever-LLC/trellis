name: Publish NPM Packages

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish packages to npm"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/publish-npm.yml"
      - "js/deno.json"
      - "js/services/**/deno.json"
      - "js/tools/package_build/**"
      - "js/packages/auth/**"
      - "js/packages/contracts/**"
      - "js/packages/telemetry/**"
      - "js/packages/result/**"
      - "js/packages/server/**"
      - "js/packages/trellis/**"
      - "js/packages/trellis-svelte/**"
      - "js/services/trellis/contracts/**"
      - "js/services/activity/contracts/**"
      - "rust/**"
      - "scripts/**"

env:
  SHOULD_PUBLISH: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish == true }}

jobs:
  publish:
    name: Verify and publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Seed generated SDK manifests for cargo metadata
        shell: bash
        working-directory: rust
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"

          write_stub_manifest() {
            local dir="$1"
            local crate_name="$2"

            mkdir -p "$dir"
            printf '[package]\nname = "%s"\nversion = "%s"\nedition = "2021"\nlicense = "Apache-2.0"\n\n[dependencies]\n' "$crate_name" "$workspace_version" > "$dir/Cargo.toml"
          }

          write_stub_manifest ../generated/rust/sdks/auth trellis-sdk-auth
          write_stub_manifest ../generated/rust/sdks/trellis-core trellis-sdk-core
          write_stub_manifest ../generated/rust/sdks/jobs trellis-sdk-jobs

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/tools/generate -> target

      - name: Build publishable npm packages
        run: deno task build:npm
        working-directory: js

      - name: Pack package archives
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/npm
          mkdir -p dist/npm

          packages=(
            js/packages/result/npm
            js/packages/trellis/npm
            js/packages/trellis-svelte/npm
          )
          for pkg in "${packages[@]}"; do
            npm pack "$pkg" --pack-destination dist/npm >/dev/null
          done

      - name: Smoke test package imports
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/trellis-npm-smoke
          mkdir -p /tmp/trellis-npm-smoke

          tgz_name() {
            local package_json="$1"
            local name
            local version
            name=$(node -p "require('./${package_json}').name")
            version=$(node -p "require('./${package_json}').version")
            name="${name#@}"
            name="${name//\//-}"
            printf '%s-%s.tgz' "$name" "$version"
          }

          result_tgz=$(tgz_name js/packages/result/npm/package.json)
          trellis_tgz=$(tgz_name js/packages/trellis/npm/package.json)
          trellis_svelte_tgz=$(tgz_name js/packages/trellis-svelte/npm/package.json)

          cd /tmp/trellis-npm-smoke
          npm init -y >/dev/null
          npm install \
            "$GITHUB_WORKSPACE/dist/npm/$result_tgz" \
            "$GITHUB_WORKSPACE/dist/npm/$trellis_tgz" \
            "$GITHUB_WORKSPACE/dist/npm/$trellis_svelte_tgz" >/dev/null
          node --input-type=module <<'EOF'
          await import("@qlever-llc/result");
          await import("@qlever-llc/trellis");
          await import("@qlever-llc/trellis/auth");
          await import("@qlever-llc/trellis/contracts");
          await import("@qlever-llc/trellis/sdk/auth");
          await import("@qlever-llc/trellis/sdk/core");
          await import("@qlever-llc/trellis/tracing");
          await import("@qlever-llc/trellis/server");
          await import("@qlever-llc/trellis/server/node");
          EOF

      - name: Configure npm registry auth
        if: env.SHOULD_PUBLISH == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish packages
        if: env.SHOULD_PUBLISH == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm_tag=latest
          published=()
          skipped=()

          package_already_exists() {
            local package_name="$1"
            local package_version="$2"
            npm view "${package_name}@${package_version}" version >/dev/null 2>&1
          }

          publish_or_skip() {
            local pkg="$1"
            local name="$2"
            local version="$3"
            local output
            local status

            if package_already_exists "$name" "$version"; then
              echo "Skipping $name@$version (already published)"
              skipped+=("$name@$version")
              return 0
            fi

            set +e
            output=$(npm publish --access public --tag "$npm_tag" "$pkg" 2>&1)
            status=$?
            set -e

            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              published+=("$name@$version")
              return 0
            fi

            if printf '%s\n' "$output" | grep -Eqi 'cannot publish over|previously published version|cannot modify pre-existing version|you cannot publish over'; then
              echo "Skipping $name@$version (already published)"
              skipped+=("$name@$version")
              return 0
            fi

            return "$status"
          }

          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == *-* ]]; then
            npm_tag=rc
          fi

          packages=(
            js/packages/result/npm
            js/packages/trellis/npm
            js/packages/trellis-svelte/npm
          )
          for pkg in "${packages[@]}"; do
            package_json="$pkg/package.json"
            name=$(node -p "require('./${package_json}').name")
            version=$(node -p "require('./${package_json}').version")
            publish_or_skip "$pkg" "$name" "$version"
          done

          echo "Published ${#published[@]} package(s)"
          for item in "${published[@]}"; do
            echo "  published: $item"
          done

          echo "Skipped ${#skipped[@]} package(s)"
          for item in "${skipped[@]}"; do
            echo "  skipped: $item"
          done
