name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish release artifacts and packages"
        required: false
        default: false
        type: boolean
      tag:
        description: "Tag to publish when running manually (for example v0.9.0-rc.1)"
        required: false
        type: string
  push:
    branches:
      - "release/v*"
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/release.yml"
      - "CHANGELOG.md"
      - "art/**"
      - "js/**"
      - "rust/**"
      - "scripts/**"
      - "xtask/**"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_HTTP_MULTIPLEXING: false
  CARGO_TERM_COLOR: always
  DENO_VERSION: 2.8.2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  REGISTRY: ghcr.io

jobs:
  resolve-release:
    name: Resolve release marker
    if: github.event_name != 'push' || github.event.deleted != true
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.release.outputs.tag }}
      release-version: ${{ steps.release.outputs.version }}
      release-base-version: ${{ steps.release.outputs.base-version }}
      should-publish: ${{ steps.release.outputs.should-publish }}
      should-create-tag: ${{ steps.release.outputs.should-create-tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release marker
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PUBLISH: ${{ inputs.publish || false }}
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          set -euo pipefail

          release_tag=""
          should_publish=false
          should_create_tag=false

          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_TAG}" ]; then
            release_tag="${INPUT_TAG}"
            if [ "${INPUT_PUBLISH}" = "true" ]; then
              should_publish=true
            fi
          else
            case "${GITHUB_REF}" in
              refs/heads/release/v*)
                release_tag="${GITHUB_REF_NAME#release/}"
                should_publish=true
                should_create_tag=true
                ;;
            esac
          fi

          if [ -n "${release_tag}" ] && [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.+-]+)?$ ]]; then
            echo "::error::Invalid release tag '${release_tag}'; expected vX.Y.Z or vX.Y.Z-rc.1"
            exit 1
          fi

          version=""
          base_version=""
          if [ -n "${release_tag}" ]; then
            version="${release_tag#v}"
            base_version="${version%%[-+]*}"
          fi

          if [ "${should_create_tag}" = "true" ] && git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            echo "::error::Release tag ${release_tag} already exists. Delete the release branch or choose a new version."
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "base-version=${base_version}" >> "${GITHUB_OUTPUT}"
          echo "should-publish=${should_publish}" >> "${GITHUB_OUTPUT}"
          echo "should-create-tag=${should_create_tag}" >> "${GITHUB_OUTPUT}"

  prepare-release:
    name: Prepare release workspace
    needs: resolve-release
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.release.outputs.tag }}
      release-version: ${{ steps.release.outputs.version }}
      release-base-version: ${{ steps.release.outputs.base-version }}
      should-publish: ${{ steps.release.outputs.should-publish }}
      should-create-tag: ${{ steps.release.outputs.should-create-tag }}
    env:
      RELEASE_TAG: ${{ needs.resolve-release.outputs.release-tag }}
      SHOULD_PUBLISH: ${{ needs.resolve-release.outputs.should-publish }}
      SHOULD_CREATE_TAG: ${{ needs.resolve-release.outputs.should-create-tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            js/node_modules
          key: deno-${{ runner.os }}-${{ env.DENO_VERSION }}-${{ hashFiles('js/deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-${{ env.DENO_VERSION }}-

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            xtask -> target
            rust -> target
            rust/xtask -> target
            rust/tools/generate -> target

      - name: Bootstrap generated SDK artifacts
        run: time cargo run --manifest-path rust/tools/generate/Cargo.toml -- prepare --no-npm .

      - name: Prepare release version
        run: time cargo run --manifest-path xtask/Cargo.toml -- release prepare --tag "${RELEASE_TAG}"

      - name: Capture release outputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${{ needs.resolve-release.outputs.release-version }}" >> "$GITHUB_OUTPUT"
          echo "base-version=${{ needs.resolve-release.outputs.release-base-version }}" >> "$GITHUB_OUTPUT"
          echo "should-publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "should-create-tag=${SHOULD_CREATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            time cargo run --manifest-path xtask/Cargo.toml -- release check-metadata --version "${RELEASE_TAG#v}"
          else
            time cargo run --manifest-path xtask/Cargo.toml -- release check-metadata
          fi

      - name: Generate release SDK artifacts
        run: time cargo run --manifest-path rust/tools/generate/Cargo.toml -- prepare --no-npm .

      - name: Write release notes
        if: env.RELEASE_TAG != ''
        run: time cargo run --manifest-path xtask/Cargo.toml -- release write-notes --tag "${RELEASE_TAG}" --output "${{ github.workspace }}/dist/release-notes.md"

      - name: Upload prepared release workspace
        uses: actions/upload-artifact@v4
        with:
          name: prepared-release
          include-hidden-files: true
          path: |
            .dockerignore
            CHANGELOG.md
            art
            generated
            js
            rust
            scripts
            xtask
            !**/.svelte-kit/**
            !**/node_modules/**
            !**/target/**

      - name: Upload release notes
        if: env.RELEASE_TAG != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist/release-notes.md

  verify-rust:
    name: Verify Rust packages
    needs: prepare-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            xtask -> target
            rust -> target
            rust/xtask -> target
            rust/tools/generate -> target

      - name: Run Rust tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            time cargo test --manifest-path rust/Cargo.toml --workspace
            time cargo test --manifest-path rust/tools/generate/Cargo.toml
            time cargo test --manifest-path rust/xtask/Cargo.toml
            time cargo test --manifest-path xtask/Cargo.toml
          else
            time cargo test --manifest-path rust/Cargo.toml --workspace --locked
            time cargo test --manifest-path rust/tools/generate/Cargo.toml --locked
            time cargo test --manifest-path rust/xtask/Cargo.toml --locked
            time cargo test --manifest-path xtask/Cargo.toml --locked
          fi

  verify-format:
    name: Verify formatting
    needs: prepare-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run formatter checks
        shell: bash
        run: |
          set -euo pipefail
          time deno fmt -c js/deno.json --check
          time cargo fmt --manifest-path rust/Cargo.toml --all --check
          time cargo fmt --manifest-path rust/tools/generate/Cargo.toml --check
          time cargo fmt --manifest-path rust/xtask/Cargo.toml --check

  verify-js:
    name: Verify npm and JSR packages
    needs: prepare-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}
      TRELLIS_SVELTE_JSR_RUNTIME_DEPENDENCY_VERSION: "0.10.18-rc.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            js/node_modules
          key: deno-${{ runner.os }}-${{ env.DENO_VERSION }}-${{ hashFiles('js/deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-${{ env.DENO_VERSION }}-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Type-check JS entrypoints
        run: time deno check -c js/deno.json js/packages/trellis/index.ts js/packages/trellis-svelte/src/index.ts js/packages/trellis-svelte/src/context.svelte.ts js/packages/trellis-test/index.ts js/services/trellis/main.ts

      - name: Build publishable npm packages
        run: time deno task packages:build:npm
        working-directory: js

      - name: Run Deno tests
        shell: bash
        run: |
          set -euo pipefail
          time deno task -c js/deno.json test:prepared:packages
          time deno task -c js/deno.json test:prepared:service:catalog-state
          time deno task -c js/deno.json test:prepared:service:auth
          time deno task -c js/deno.json test:prepared:ui-tools
          time deno task -c js/deno.json test:prepared:packaging

      - name: Smoke test packed npm packages
        run: time deno task smoke:npm
        working-directory: js

      - name: Dry-run npm publishing
        shell: bash
        run: |
          set -euo pipefail
          npm_tag=latest
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            npm_tag=rc
          fi
          start_seconds=$SECONDS
          for pkg in \
            js/packages/result/npm \
            js/packages/trellis/npm \
            js/packages/trellis-svelte/npm
          do
            npm publish --dry-run --access public --tag "$npm_tag" "$pkg"
          done
          printf 'npm dry-runs completed in %ss\n' "$((SECONDS - start_seconds))"

      - name: Dry-run JSR publishing
        shell: bash
        run: |
          set -euo pipefail
          for pkg in \
            js/packages/result \
            js/packages/trellis \
            js/services/trellis \
            js/packages/trellis-test \
            js/packages/trellis-svelte/jsr
          do
            (cd "$pkg" && time deno publish --dry-run --allow-slow-types --allow-dirty)
          done

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: |
            js/packages/result/npm
            js/packages/trellis/npm
            js/packages/trellis-svelte/npm
            dist/npm

      - name: Upload trellis-svelte JSR package artifact
        uses: actions/upload-artifact@v4
        with:
          name: trellis-svelte-jsr-package
          path: js/packages/trellis-svelte/jsr

  build-cli:
    name: Build ${{ matrix.target }} CLI
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Add target toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            xtask -> target
            rust -> target
            rust/xtask -> target
            rust/tools/generate -> target

      - name: Refresh generated Rust SDK paths
        shell: bash
        run: |
          set -euo pipefail
          time cargo run --manifest-path rust/tools/generate/Cargo.toml -- -f prepare --no-npm .

      - name: Build release binaries
        shell: bash
        env:
          TRELLIS_OFFICIAL_BUILD: "1"
          TRELLIS_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            time cargo build -p trellis-cli --release --target ${{ matrix.target }}
            time cargo build --manifest-path tools/generate/Cargo.toml --release --target ${{ matrix.target }}
          else
            time cargo build -p trellis-cli --release --locked --target ${{ matrix.target }}
            time cargo build --manifest-path tools/generate/Cargo.toml --release --locked --target ${{ matrix.target }}
          fi
        working-directory: rust

      - name: Package CLI archives
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG:-${GITHUB_REF_NAME:-dev}}"
          target="${{ matrix.target }}"
          archive_version="${version//\//-}"
          staging="dist/${target}"
          mkdir -p "$staging"

          cp "rust/target/${target}/release/trellis" "$staging/trellis"
          archive="trellis-${archive_version}-${target}.tar.gz"
          tar -C "$staging" -czf "dist/$archive" trellis
          shasum -a 256 "dist/$archive" > "dist/checksum-${archive_version}-${target}-trellis.sha256"

          cp "rust/tools/generate/target/${target}/release/trellis-generate" "$staging/trellis-generate"
          archive="trellis-generate-${archive_version}-${target}.tar.gz"
          tar -C "$staging" -czf "dist/$archive" trellis-generate
          shasum -a 256 "dist/$archive" > "dist/checksum-${archive_version}-${target}-trellis-generate.sha256"

      - name: Upload packaged CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: trellis-cli-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  verify-images:
    name: Verify ${{ matrix.image }} image
    needs: prepare-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: trellis
            file: js/services/trellis/Containerfile
            title: trellis
            description: Trellis service runtime
            contract-path: /trellis/contract.json
          - image: console
            file: js/apps/console/Containerfile
            title: console
            description: Trellis administrative web console
            contract-path: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Dry-run image build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            TRELLIS_VERSION=${{ env.RELEASE_TAG }}
            TRELLIS_REVISION=${{ github.sha }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            io.trellis.contract.path=${{ matrix.contract-path }}

  verify-js-integration:
    name: Verify JS integration suite
    needs: prepare-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            js/node_modules
          key: deno-${{ runner.os }}-${{ env.DENO_VERSION }}-${{ hashFiles('js/deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-${{ env.DENO_VERSION }}-

      - name: Run JS integration tests
        run: time deno task -c js/deno.json test:integration

  verify-rust-integration:
    name: Verify Rust integration suite
    needs: prepare-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            xtask -> target
            rust -> target
            rust/xtask -> target
            rust/tools/generate -> target

      - name: Run Rust integration tests
        run: time cargo test --manifest-path rust/Cargo.toml -p trellis-rs --test integration -- --ignored --nocapture

  release-gate:
    name: Release gate
    needs:
      - verify-format
      - verify-rust
      - verify-js
      - build-cli
      - verify-images
      - verify-js-integration
      - verify-rust-integration
    runs-on: ubuntu-latest

    steps:
      - name: Confirm release verification passed
        run: printf 'Release verification passed.\n'

  create-release-tag:
    name: Create release tag
    if: needs.prepare-release.outputs.should-create-tag == 'true'
    needs:
      - prepare-release
      - release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create and push release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release tag ${RELEASE_TAG} already exists."
            exit 1
          fi

          branch_ref="refs/heads/release/${RELEASE_TAG}"
          branch_line="$(git ls-remote --heads origin "${branch_ref}")"
          branch_sha="${branch_line%%$'\t'*}"
          if [ "${branch_sha}" != "${EXPECTED_SHA}" ]; then
            echo "::error::Release branch ${branch_ref} points to ${branch_sha:-nothing}, expected ${EXPECTED_SHA}."
            exit 1
          fi

          git tag "${RELEASE_TAG}" "${EXPECTED_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

          branch_line="$(git ls-remote --heads origin "${branch_ref}")"
          branch_sha="${branch_line%%$'\t'*}"
          if [ "${branch_sha}" != "${EXPECTED_SHA}" ]; then
            git push origin ":refs/tags/${RELEASE_TAG}" || true
            echo "::error::Release branch ${branch_ref} moved to ${branch_sha:-nothing} while creating ${RELEASE_TAG}; deleted the new tag before publishing."
            exit 1
          fi

          remote_line="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}")"
          remote_sha="${remote_line%%$'\t'*}"
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} points to ${remote_sha}, expected ${EXPECTED_SHA}."
            exit 1
          fi

  github-release:
    name: Publish GitHub release
    if: always() && needs.prepare-release.outputs.should-publish == 'true' && needs.release-gate.result == 'success' && (needs.prepare-release.outputs.should-create-tag != 'true' || needs.create-release-tag.result == 'success')
    needs:
      - prepare-release
      - release-gate
      - create-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: trellis-cli-*
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TRELLIS_RELEASE_TOKEN || github.token }}
          tag_name: ${{ needs.prepare-release.outputs.release-tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          body_path: dist/release-notes.md
          prerelease: ${{ contains(needs.prepare-release.outputs.release-tag, '-') }}

  publish-crates:
    name: Publish Rust crates
    if: always() && needs.prepare-release.outputs.should-publish == 'true' && needs.release-gate.result == 'success' && needs.github-release.result == 'success'
    needs:
      - prepare-release
      - release-gate
      - github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            xtask -> target
            rust -> target
            rust/xtask -> target
            rust/tools/generate -> target

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        shell: bash
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"
          published=()
          skipped=()

          crate_exists() {
            local crate="$1"
            local version="$2"
            curl --silent --show-error --fail "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null 2>&1
          }

          wait_for_crate_index() {
            local crate="$1"
            local version="$2"

            for attempt in {1..30}; do
              if cargo info "${crate}@${version}" >/dev/null 2>&1; then
                return 0
              fi
              printf 'Waiting for %s@%s to appear in the crates.io index (%s/30)\n' "$crate" "$version" "$attempt"
              sleep 10
            done

            echo "::error::${crate}@${version} did not appear in the crates.io index"
            return 1
          }

          record_skip() {
            local crate="$1"
            echo "Skipping ${crate}@${workspace_version} (already published)"
            skipped+=("${crate}@${workspace_version}")
            wait_for_crate_index "$crate" "$workspace_version"
          }

          record_publish() {
            local crate="$1"
            published+=("${crate}@${workspace_version}")
          }

          run_publish() {
            local crate="$1"
            shift
            local output
            local status

            time cargo publish --allow-dirty --dry-run "$@"

            set +e
            output=$(time cargo publish --allow-dirty "$@" 2>&1)
            status=$?
            set -e

            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              record_publish "$crate"
              wait_for_crate_index "$crate" "$workspace_version"
              return 0
            fi

            if printf '%s\n' "$output" | grep -Fq "already exists on crates.io index"; then
              record_skip "$crate"
              return 0
            fi

            return "$status"
          }

          publish_workspace_crate() {
            local crate="$1"

            if crate_exists "$crate" "$workspace_version"; then
              record_skip "$crate"
              return 0
            fi

            run_publish "$crate" -p "$crate"
          }

          publish_workspace_crate trellis-contracts
          publish_workspace_crate trellis-rs

          echo "Published ${#published[@]} crate(s)"
          for item in "${published[@]}"; do
            echo "  published: $item"
          done

          echo "Skipped ${#skipped[@]} crate(s)"
          for item in "${skipped[@]}"; do
            echo "  skipped: $item"
          done

  publish-npm:
    name: Publish npm packages
    if: always() && needs.prepare-release.outputs.should-publish == 'true' && needs.github-release.result == 'success' && needs.verify-js.result == 'success'
    needs:
      - prepare-release
      - github-release
      - verify-js
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: .

      - name: Configure npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Publish packages
        shell: bash
        run: |
          set -euo pipefail
          npm_tag=latest
          published=()
          skipped=()

          package_already_exists() {
            local package_name="$1"
            local package_version="$2"
            npm view "${package_name}@${package_version}" version >/dev/null 2>&1
          }

          publish_or_skip() {
            local pkg="$1"
            local name="$2"
            local version="$3"
            local output
            local status

            if package_already_exists "$name" "$version"; then
              echo "Skipping $name@$version (already published)"
              skipped+=("$name@$version")
              return 0
            fi

            set +e
            output=$(npm publish --access public --tag "$npm_tag" "$pkg" 2>&1)
            status=$?
            set -e

            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              published+=("$name@$version")
              return 0
            fi

            if printf '%s\n' "$output" | grep -Eqi 'cannot publish over|previously published version|cannot modify pre-existing version|you cannot publish over'; then
              echo "Skipping $name@$version (already published)"
              skipped+=("$name@$version")
              return 0
            fi

            return "$status"
          }

          if [[ "${RELEASE_TAG}" == *-* ]]; then
            npm_tag=rc
          fi

          packages=(
            js/packages/result/npm
            js/packages/trellis/npm
            js/packages/trellis-svelte/npm
          )
          for pkg in "${packages[@]}"; do
            package_json="$pkg/package.json"
            name=$(node -p "require('./${package_json}').name")
            version=$(node -p "require('./${package_json}').version")
            publish_or_skip "$pkg" "$name" "$version"
          done

          echo "Published ${#published[@]} package(s)"
          for item in "${published[@]}"; do
            echo "  published: $item"
          done

          echo "Skipped ${#skipped[@]} package(s)"
          for item in "${skipped[@]}"; do
            echo "  skipped: $item"
          done

  publish-jsr:
    name: Publish JSR packages
    if: always() && needs.prepare-release.outputs.should-publish == 'true' && needs.github-release.result == 'success' && needs.verify-js.result == 'success'
    needs:
      - prepare-release
      - github-release
      - verify-js
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Download trellis-svelte JSR package artifact
        uses: actions/download-artifact@v4
        with:
          name: trellis-svelte-jsr-package
          path: js/packages/trellis-svelte/jsr

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            js/node_modules
          key: deno-${{ runner.os }}-${{ env.DENO_VERSION }}-${{ hashFiles('js/deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-${{ env.DENO_VERSION }}-

      - name: Publish JSR packages
        shell: bash
        run: |
          set -euo pipefail
          published=()
          skipped=()

          package_field() {
            local manifest="$1"
            local field="$2"
            deno eval 'const manifest = JSON.parse(await Deno.readTextFile(Deno.args[0])); console.log(manifest[Deno.args[1]]);' "$manifest" "$field"
          }

          jsr_package_exists() {
            local package_name="$1"
            local package_version="$2"
            curl -fsL -o /dev/null "https://jsr.io/${package_name}/${package_version}_meta.json"
          }

          wait_for_jsr_package() {
            local package_name="$1"
            local package_version="$2"

            for attempt in {1..30}; do
              if jsr_package_exists "$package_name" "$package_version"; then
                return 0
              fi
              printf 'Waiting for %s@%s to appear on JSR (%s/30)\n' "$package_name" "$package_version" "$attempt"
              sleep 10
            done

            echo "::error::${package_name}@${package_version} did not appear on JSR"
            return 1
          }

          publish_or_skip() {
            local package_dir="$1"
            local manifest="${package_dir}/deno.json"
            local package_name
            local package_version
            package_name="$(package_field "$manifest" name)"
            package_version="$(package_field "$manifest" version)"

            if jsr_package_exists "$package_name" "$package_version"; then
              echo "Skipping ${package_name}@${package_version} (already published)"
              skipped+=("${package_name}@${package_version}")
              wait_for_jsr_package "$package_name" "$package_version"
              return 0
            fi

            (cd "$package_dir" && time deno publish --allow-slow-types --allow-dirty)
            published+=("${package_name}@${package_version}")
            wait_for_jsr_package "$package_name" "$package_version"
          }

          publish_or_skip js/packages/result
          publish_or_skip js/packages/trellis
          publish_or_skip js/services/trellis
          publish_or_skip js/packages/trellis-test

          TRELLIS_SVELTE_JSR_RUNTIME_DEPENDENCY_VERSION="${RELEASE_VERSION}" \
            deno task -c js/packages/trellis-svelte/deno.json build:npm
          publish_or_skip js/packages/trellis-svelte/jsr

          echo "Published ${#published[@]} JSR package(s)"
          for item in "${published[@]}"; do
            echo "  published: $item"
          done

          echo "Skipped ${#skipped[@]} JSR package(s)"
          for item in "${skipped[@]}"; do
            echo "  skipped: $item"
          done

  publish-images:
    name: Publish ${{ matrix.image }} image
    if: always() && needs.prepare-release.outputs.should-publish == 'true' && needs.release-gate.result == 'success' && needs.github-release.result == 'success'
    needs:
      - prepare-release
      - release-gate
      - github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: trellis
            file: js/services/trellis/Containerfile
            title: trellis
            description: Trellis service runtime
            contract-path: /trellis/contract.json
          - image: console
            file: js/apps/console/Containerfile
            title: console
            description: Trellis administrative web console
            contract-path: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download prepared release workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: .

      - name: Normalize image owner
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ env.RELEASE_TAG != '' }}
            type=sha,prefix=sha-
            type=raw,value=rc,enable=${{ env.RELEASE_TAG != '' && contains(env.RELEASE_TAG, '-') }}
            type=raw,value=latest,enable=${{ env.RELEASE_TAG != '' && !contains(env.RELEASE_TAG, '-') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            TRELLIS_VERSION=${{ env.RELEASE_TAG }}
            TRELLIS_REVISION=${{ github.sha }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            io.trellis.contract.path=${{ matrix.contract-path }}
