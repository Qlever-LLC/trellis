name: Publish Images

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push images to GHCR"
        required: false
        default: false
        type: boolean
      tag:
        description: "Tag to publish when running manually (for example v0.8.0-rc.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/publish-images.yml"
      - ".dockerignore"
      - "CHANGELOG.md"
      - "js/portals/login/**"
      - "js/services/jobs/**"
      - "js/services/trellis/**"
      - "js/apps/console/**"
      - "js/packages/**"
      - "js/deno.json"
      - "js/deno.lock"
      - "js/tools/release/**"
      - "rust/**"
      - "scripts/**"

env:
  REGISTRY: ghcr.io
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag || '' }}
  SHOULD_PUSH: ${{ startsWith(github.ref, 'refs/tags/') || (inputs.publish == true && inputs.tag != '') }}

jobs:
  trellis:
    name: Publish trellis service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Validate release metadata
        run: deno run --config js/deno.json -A js/tools/release/validate_release.ts
        env:
          TRELLIS_RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Prepare release version
        run: deno run --config js/deno.json -A js/tools/release/prepare_release.ts
        env:
          TRELLIS_RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Seed generated SDK manifests for cargo metadata
        shell: bash
        working-directory: rust
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"

          write_stub_manifest() {
            local dir="$1"
            local crate_name="$2"

            mkdir -p "$dir"
            printf '[package]\nname = "%s"\nversion = "%s"\nedition = "2021"\nlicense = "Apache-2.0"\n\n[dependencies]\n' "$crate_name" "$workspace_version" > "$dir/Cargo.toml"
          }

          write_stub_manifest ../generated/rust/sdks/auth trellis-sdk-auth
          write_stub_manifest ../generated/rust/sdks/trellis-core trellis-sdk-core
          write_stub_manifest ../generated/rust/sdks/jobs trellis-sdk-jobs

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/tools/generate -> target

      - name: Generate SDK artifacts
        run: deno task prepare
        working-directory: js

      - name: Normalize image owner
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract trellis image metadata
        id: trellis_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/trellis
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ env.RELEASE_TAG != '' }}
            type=sha,prefix=sha-
            type=raw,value=rc,enable=${{ env.RELEASE_TAG != '' && contains(env.RELEASE_TAG, '-') }}
            type=raw,value=latest,enable=${{ env.RELEASE_TAG != '' && !contains(env.RELEASE_TAG, '-') }}

      - name: Build trellis image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: js/services/trellis/Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.trellis_meta.outputs.tags }}
          build-args: |
            TRELLIS_VERSION=${{ env.RELEASE_TAG }}
            TRELLIS_REVISION=${{ github.sha }}
          labels: |
            ${{ steps.trellis_meta.outputs.labels }}
            org.opencontainers.image.title=trellis
            org.opencontainers.image.description=Trellis service runtime
            io.trellis.contract.path=/trellis/contract.json

  console:
    name: Publish console
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Validate release metadata
        run: deno run --config js/deno.json -A js/tools/release/validate_release.ts
        env:
          TRELLIS_RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Prepare release version
        run: deno run --config js/deno.json -A js/tools/release/prepare_release.ts
        env:
          TRELLIS_RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Seed generated SDK manifests for cargo metadata
        shell: bash
        working-directory: rust
        run: |
          set -euo pipefail

          workspace_version="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f 2)"

          write_stub_manifest() {
            local dir="$1"
            local crate_name="$2"

            mkdir -p "$dir"
            printf '[package]\nname = "%s"\nversion = "%s"\nedition = "2021"\nlicense = "Apache-2.0"\n\n[dependencies]\n' "$crate_name" "$workspace_version" > "$dir/Cargo.toml"
          }

          write_stub_manifest ../generated/rust/sdks/auth trellis-sdk-auth
          write_stub_manifest ../generated/rust/sdks/trellis-core trellis-sdk-core
          write_stub_manifest ../generated/rust/sdks/jobs trellis-sdk-jobs

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            rust/tools/generate -> target

      - name: Generate SDK artifacts
        run: deno task prepare
        working-directory: js

      - name: Normalize image owner
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract console image metadata
        id: console_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/console
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ env.RELEASE_TAG != '' }}
            type=sha,prefix=sha-
            type=raw,value=rc,enable=${{ env.RELEASE_TAG != '' && contains(env.RELEASE_TAG, '-') }}
            type=raw,value=latest,enable=${{ env.RELEASE_TAG != '' && !contains(env.RELEASE_TAG, '-') }}

      - name: Build console image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: js/apps/console/Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.console_meta.outputs.tags }}
          labels: |
            ${{ steps.console_meta.outputs.labels }}
            org.opencontainers.image.title=console
            org.opencontainers.image.description=Trellis administrative web console
