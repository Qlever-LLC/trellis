name: Publish Images

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push images to GHCR"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/publish-images.yml"
      - ".dockerignore"
      - "js/services/trellis/**"
      - "js/apps/trellis/**"
      - "js/packages/**"
      - "js/deno.json"
      - "js/deno.lock"

env:
  REGISTRY: ghcr.io
  SHOULD_PUSH: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish == true }}

jobs:
  trellis-runtime:
    name: Publish trellis runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract runtime image metadata
        id: runtime_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/trellis-runtime
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=rc,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: js/services/trellis/Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.runtime_meta.outputs.tags }}
          labels: ${{ steps.runtime_meta.outputs.labels }}

  trellis-app:
    name: Build trellis app (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            platform_tag: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            platform_tag: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app image metadata
        id: app_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/trellis-app
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=rc,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}

      - name: Build app image for verification
        if: env.SHOULD_PUSH != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: js/apps/trellis/Containerfile
          platforms: ${{ matrix.platform }}
          push: false
          labels: ${{ steps.app_meta.outputs.labels }}

      - name: Build and push app image by digest
        id: app_build
        if: env.SHOULD_PUSH == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: js/apps/trellis/Containerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.app_meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/trellis-app,push-by-digest=true,name-canonical=true,push=true

      - name: Export app image digest
        if: env.SHOULD_PUSH == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.app_build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload app image digest
        if: env.SHOULD_PUSH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trellis-app-digests-${{ matrix.platform_tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  trellis-app-merge:
    name: Publish trellis app manifest
    if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.publish == true }}
    needs: trellis-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download app image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: trellis-app-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app image metadata
        id: app_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/trellis-app
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=rc,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}

      - name: Create app multi-arch manifest
        working-directory: /tmp/digests
        shell: bash
        run: |
          set -euo pipefail
          tags=()
          while IFS= read -r tag; do
            tags+=("-t" "$tag")
          done < <(printf '%s\n' "${{ steps.app_meta.outputs.tags }}")

          refs=()
          for digest_file in *; do
            refs+=("${{ env.REGISTRY }}/${{ github.repository_owner }}/trellis-app@sha256:${digest_file}")
          done

          docker buildx imagetools create "${tags[@]}" "${refs[@]}"
