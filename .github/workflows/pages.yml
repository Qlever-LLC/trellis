name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: ~/.cache/trellis/pages-generator
          key: pages-generator-${{ runner.os }}-${{ hashFiles('js/packages/trellis/deno.json') }}
          restore-keys: |
            pages-generator-${{ runner.os }}-

      - name: Build released and current site artifacts
        shell: bash
        run: |
          set -euo pipefail

          repo_name="${GITHUB_REPOSITORY#*/}"
          site_root="/${repo_name}"
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [ -z "${latest_tag}" ]; then
            echo "No release tag found; using current HEAD for release site"
            latest_tag="HEAD"
          fi

          release_root="/tmp/trellis-release-site"
          current_root="${GITHUB_WORKSPACE}"
          generator_cache="${HOME}/.cache/trellis/pages-generator"
          generator_target="x86_64-unknown-linux-gnu"
          pages_root="/tmp/trellis-pages-site"
          release_worktree="/tmp/trellis-release-worktree"

          rm -rf "${release_root}" "${pages_root}" "${release_worktree}"
          mkdir -p "${release_root}" "${pages_root}"

          if [ "${latest_tag}" = "HEAD" ]; then
            release_worktree="${current_root}"
          else
            git worktree add --detach "${release_worktree}" "${latest_tag}"
          fi

          cleanup() {
            if [ "${release_worktree}" != "${current_root}" ]; then
              git worktree remove --force "${release_worktree}"
            fi
          }
          trap cleanup EXIT

          package_version() {
            local repo_root="$1"

            deno eval 'const manifest = JSON.parse(await Deno.readTextFile(Deno.args[0])); console.log(manifest.version);' "${repo_root}/js/packages/trellis/deno.json"
          }

          try_release_generator() {
            local tag="$1"
            local repo_root="$2"

            if [ -z "${tag}" ] || [ "${tag}" = "HEAD" ]; then
              return 1
            fi

            local cache_dir="${generator_cache}/${tag}/${generator_target}"
            local binary="${cache_dir}/trellis-generate"
            local archive="trellis-generate-${tag}-${generator_target}.tar.gz"
            local checksum="checksum-${tag}-${generator_target}-trellis-generate.sha256"

            if [ ! -x "${binary}" ]; then
              local temp_dir
              temp_dir="$(mktemp -d)"
              local cleanup_temp
              cleanup_temp() {
                rm -rf "${temp_dir}"
              }

              local release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
              echo "Trying published trellis-generate ${tag} for ${repo_root}"
              if ! curl --fail --location --silent --show-error --output "${temp_dir}/${archive}" "${release_url}/${archive}"; then
                echo "Published trellis-generate archive is not available for ${tag}; falling back to cargo"
                cleanup_temp
                return 1
              fi
              if ! curl --fail --location --silent --show-error --output "${temp_dir}/${checksum}" "${release_url}/${checksum}"; then
                echo "Published trellis-generate checksum is not available for ${tag}; falling back to cargo"
                cleanup_temp
                return 1
              fi

              local expected actual _rest
              read -r expected _rest < "${temp_dir}/${checksum}"
              actual="$(shasum -a 256 "${temp_dir}/${archive}")"
              actual="${actual%% *}"
              if [ "${actual}" != "${expected}" ]; then
                echo "Checksum mismatch for ${archive}; falling back to cargo"
                cleanup_temp
                return 1
              fi

              mkdir -p "${cache_dir}"
              tar -xzf "${temp_dir}/${archive}" -C "${cache_dir}"
              chmod +x "${binary}"
              cleanup_temp
            else
              echo "Using cached trellis-generate ${tag} for ${repo_root}"
            fi

            "${binary}" prepare --no-npm "${repo_root}"
          }

          run_cargo_generator() {
            local repo_root="$1"

            echo "Building trellis-generate from source for ${repo_root}"
            cargo run --manifest-path "${repo_root}/rust/tools/generate/Cargo.toml" -- prepare --no-npm "${repo_root}"
          }

          prepare_sdk_artifacts() {
            local repo_root="$1"
            local preferred_tag="$2"
            local fallback_tag="${3:-}"

            if try_release_generator "${preferred_tag}" "${repo_root}"; then
              return 0
            fi
            if [ -n "${fallback_tag}" ] && [ "${fallback_tag}" != "${preferred_tag}" ] && try_release_generator "${fallback_tag}" "${repo_root}"; then
              return 0
            fi
            run_cargo_generator "${repo_root}"
          }

          prepared_roots=()
          prepare_once() {
            local repo_root="$1"
            local preferred_tag="$2"
            local fallback_tag="${3:-}"

            for prepared_root in "${prepared_roots[@]}"; do
              if [ "${prepared_root}" = "${repo_root}" ]; then
                return 0
              fi
            done

            prepare_sdk_artifacts "${repo_root}" "${preferred_tag}" "${fallback_tag}"
            prepared_roots+=("${repo_root}")
          }

          build_guides() {
            local repo_root="$1"
            local base_path="$2"
            local out_dir="$3"

            (
              cd "${repo_root}/guides"
              deno install --allow-scripts=npm:esbuild,npm:sharp
              deno run -A ./scripts/generate_ts_api_docs.ts
              SITE_BASE_PATH="${base_path}" deno run -A vite build
              mkdir -p "${out_dir}"
              cp -R build/. "${out_dir}/"
            )
          }

          build_console() {
            local repo_root="$1"
            local base_path="$2"
            local out_dir="$3"

            (
              cd "${repo_root}/js/apps/console"
              SITE_BASE_PATH="${base_path}" deno run -A vite build
              mkdir -p "${out_dir}"
              cp -R build/. "${out_dir}/"
            )
          }

          release_console_root="${release_worktree}"
          if ! grep -q 'SITE_BASE_PATH' "${release_worktree}/js/apps/console/svelte.config.js"; then
            echo "Latest release tag predates Pages console base-path support; using current main console until the next release tag"
            release_console_root="${current_root}"
          fi

          current_tag="v$(package_version "${current_root}")"

          prepare_once "${release_worktree}" "${latest_tag}"
          prepare_once "${current_root}" "${current_tag}"

          build_guides "${release_worktree}" "${site_root}" "${release_root}/guides"
          build_guides "${current_root}" "${site_root}/current" "${pages_root}/current"

          build_console "${release_console_root}" "${site_root}/console" "${release_root}/console"
          build_console "${current_root}" "${site_root}/current/console" "${pages_root}/current/console"

          cp -R "${release_root}/guides/." "${pages_root}/"
          mkdir -p "${pages_root}/console"
          cp -R "${release_root}/console/." "${pages_root}/console/"

          cat > "${pages_root}/404.html" <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Trellis site redirect</title>
              <script>
                (() => {
                  const siteRoot = ${site_root@Q};
                  const pathname = window.location.pathname;
                  const search = window.location.search;
                  const hash = window.location.hash;
                  const prefixes = ["/current/console", "/console"];

                  for (const prefix of prefixes) {
                    const fullPrefix = siteRoot + prefix;
                    if (pathname === fullPrefix || pathname.startsWith(fullPrefix + "/")) {
                      const route = pathname.slice(fullPrefix.length).replace(/^\//, "");
                      const target = new URL(fullPrefix + "/", window.location.origin);
                      if (route || search || hash) {
                        target.searchParams.set("__trellis_route", route + search + hash);
                      }
                      window.location.replace(target.toString());
                      return;
                    }
                  }

                  window.location.replace(window.location.origin + siteRoot + "/");
                })();
              </script>
            </head>
            <body></body>
          </html>
          EOF

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/trellis-pages-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
