<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='28' fill='%23101828'/%3E%3Cpath d='M24 24h72L86 40H68v56H52V40H34L24 24Z' fill='%23B86B35'/%3E%3Cpath d='M42 40 68 66M78 40 52 66M52 80 68 64M34 40h52M52 96h16' fill='none' stroke='%23FFF7EF' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <script>
      (() => {
        const url = new URL(window.location.href);
        const route = url.searchParams.get("__trellis_route");
        if (route === null) return;

        url.searchParams.delete("__trellis_route");
        const basePath = url.pathname.endsWith("/")
          ? url.pathname
          : `${url.pathname}/`;
        const restored = new URL(route || ".", `${url.origin}${basePath}`);

        history.replaceState(
          history.state,
          "",
          `${restored.pathname}${restored.search}${restored.hash}`,
        );
      })();
    </script>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("trellis.console.theme");
          document.documentElement.setAttribute(
            "data-theme",
            theme === "trellis-dark" ? "trellis-dark" : "trellis",
          );
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "trellis");
        }
      })();
    </script>
    <script src="%sveltekit.assets%/runtime-config.js"></script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
