[package]
name = "trellis-generate"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
miette = { version = "7.6.0", features = ["fancy"] }
owo-colors = "4.3.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tempfile = "3.27.0"
trellis-codegen-rust = { path = "../../crates/codegen-rust" }
trellis-codegen-ts = { path = "../../crates/codegen-ts" }
trellis-contracts = { path = "../../crates/contracts" }
trellis-tooling-support = { path = "../../crates/tooling-support" }
